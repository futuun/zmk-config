# Disable battery level reporting (was CONFIG_BT_BAS=n)
CONFIG_ZMK_BATTERY_REPORTING=n

# Right half is the split central (trackpoint lives here)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# The ps2-uart driver only uses the interrupt-driven UART API (uart_irq_*),
# but its Kconfig selects UART_ASYNC_API, which on Zephyr 4.1 puts uart0
# into async mode and turns every uart_irq_* call into a no-op (dead
# trackpoint). Force the instance into interrupt-driven mode.
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_0_INTERRUPT_DRIVEN=y
CONFIG_UART_0_ASYNC=n
