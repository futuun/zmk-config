# Pointing (HID mouse + &mmv/&msc/&mkp behaviors)
CONFIG_ZMK_POINTING=y

# Smooth scrolling (HID resolution multiplier). Kept off on purpose:
# host-side smoothing experiments need raw 1-unit wheel detents.
# Enabling it changes the HID descriptor -> re-pair BLE afterwards.
# CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Encoders. Dedicated sampling thread (not the system workqueue): with
# GLOBAL_THREAD the busy central sampled the pins too late, collapsing the
# two quadrature edges of a detent into one invalid transition -> dropped
# detents (~20% on the right half, ~5% on the left).
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_OWN_THREAD=y
CONFIG_EC11_THREAD_PRIORITY=5

# External power rail stays on: the trackpoint's VCC is wired to the
# switched rail, so disabling this kills the trackpoint.
CONFIG_ZMK_EXT_POWER=y
