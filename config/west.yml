manifest:
  remotes:
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: futuun
      url-base: https://github.com/futuun
  projects:
    # badjeff's fork tracks zmkfirmware/zmk main closely and carries the
    # PS/2 input plumbing the trackpoint driver module needs (PS/2 transport
    # was never merged into mainline ZMK).
    - name: zmk
      remote: badjeff
      revision: main
      import: app/west.yml
    - name: kb_zmk_ps2_mouse_trackpoint_driver
      remote: futuun
      revision: fix/rst-gpios-prop-name
  self:
    path: config
